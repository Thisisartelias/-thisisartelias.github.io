</head>
<body>
<header>
    <nav>
        <div class="logo">ThisIsArtElias</div>
        <ul>

<main>
<section class="commissions">
    <h2 data-key="commissionsTitle">Commissions</h2>
    <p data-key="commissionsIntro">Please fill in the form to request a custom artwork. Include details like size, style, and any reference images.</p>

    <form action="mailto:ContactArtElias@gmail.com" method="post" enctype="text/plain">
        <label data-key="nameLabel">Name:</label>
        <input type="text" name="Name" required>

        <label data-key="emailLabel">Email:</label>
        <input type="email" name="Email" required>

        <label data-key="detailsLabel">Artwork Details:</label>
        <textarea name="Details" rows="5" required></textarea>

        <button type="submit" data-key="submitBtn">Send Request</button>
    </form>
</section>
</main>

<footer>
<p>&copy; 2026 ThisIsArtElias | <a href="https://instagram.com/thisisartelias">Instagram</a> | Contact: <a href="mailto:ContactArtElias@gmail.com">ContactArtElias@gmail.com</a></p>
</footer>

<script src="js/main.js"></script>

    nl: {

        commissionsIntro: "Vul het formulier in om een op maat gemaakt kunstwerk aan te vragen. Voeg details toe zoals grootte, stijl en eventuele referentiebeelden.",
        nameLabel: "Naam:",
        emailLabel: "E-mail:",
        detailsLabel: "Details van het Kunstwerk:",
        submitBtn: "Verstuur Aanvraag"
    }
};
document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if(commissionsTranslations[currentLang] && commissionsTranslations[currentLang][key]){
        el.textContent = commissionsTranslations[currentLang][key];
    }
});
</script>
